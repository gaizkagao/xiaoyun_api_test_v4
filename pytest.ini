[pytest]
# 测试用例搜索目录
testpaths = testcases

# 测试文件命名规则
python_files = test_*.py

# 测试类命名规则
python_classes = Test*

# 测试方法命名规则
python_functions = test_*

# 默认命令行参数：
# -v 详细输出
# --alluredir 指定Allure报告数据输出目录
# --clean-alluredir 每次运行前清空报告目录
addopts = -v --alluredir=reports/allure-results --clean-alluredir

# 自定义标记
markers =
    smoke: 冒烟测试用例
    regression: 回归测试用例
